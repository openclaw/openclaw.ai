<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Security review loop</title>
  <desc id="desc">A loop diagram showing advisories becoming precise rules that protect future pull requests.</desc>
  <rect width="1200" height="560" rx="32" fill="#0B1020"/>
  <text x="600" y="94" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" text-anchor="middle">Patch once, prevent the class</text>
  <circle cx="600" cy="286" r="146" fill="#111A2E" stroke="#2D3B5E" stroke-width="2"/>
  <path d="M600 126a160 160 0 0 1 150 105" stroke="#00E5CC" stroke-width="10" stroke-linecap="round"/>
  <path d="M754 207l7 47l-43-21" stroke="#00E5CC" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M739 391a160 160 0 0 1-267 16" stroke="#FF8A8A" stroke-width="10" stroke-linecap="round"/>
  <path d="M498 444l-42-22l38-29" stroke="#FF8A8A" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="600" y="258" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" text-anchor="middle">OpenGrep</text>
  <text x="600" y="298" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="22" text-anchor="middle">precise advisory-backed rules</text>
  <g font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">
    <rect x="92" y="236" width="246" height="96" rx="20" fill="#2A1722" stroke="#FF8A8A" stroke-width="2"/>
    <text x="215" y="276" fill="#FFE4E6" text-anchor="middle">GHSA / review</text>
    <text x="215" y="306" fill="#94A3B8" font-size="18" font-weight="500" text-anchor="middle">bug class evidence</text>
    <rect x="862" y="236" width="246" height="96" rx="20" fill="#102A35" stroke="#00E5CC" stroke-width="2"/>
    <text x="985" y="276" fill="#CFFAFE" text-anchor="middle">PR diff</text>
    <text x="985" y="306" fill="#94A3B8" font-size="18" font-weight="500" text-anchor="middle">regression caught early</text>
  </g>
</svg>
