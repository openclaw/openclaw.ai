name: Update skills

on:
  schedule:
    - cron: "17 15 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-skills
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Update project skills
        run: |
          set -euo pipefail
          # The committed .agents directory keeps updates in universal project scope.
          output="$(npx --yes skills@1.5.16 update --project --yes 2>&1)"
          # Headless agent detection also emits an Eve mirror; .agents is canonical here.
          rm -rf agent
          printf '%s\n' "$output"
          if grep -q "Failed to update" <<<"$output"; then
            echo "One or more skills failed to update." >&2
            exit 1
          fi

      - name: Stage managed skill changes
        id: changes
        run: |
          set -euo pipefail

          git add skills-lock.json
          while IFS= read -r skill; do
            git add ".agents/skills/${skill}"
          done < <(jq -r '.skills | keys[]' skills-lock.json)

          unexpected="$(
            git status --porcelain=v1 --untracked-files=all \
              | awk 'substr($0, 1, 2) == "??" || substr($0, 2, 1) != " "'
          )"
          if [[ -n "$unexpected" ]]; then
            echo "Unexpected unstaged paths changed:"
            echo "$unexpected"
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          branch="automation/update-skills"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "refs/heads/${branch}:refs/remotes/origin/${branch}" || true
          git switch -C "$branch"
          git commit -m "chore: update skills"
          git push --force-with-lease origin "$branch"

          body="$RUNNER_TEMP/update-skills-pr.md"
          {
            echo "## Summary"
            echo
            echo "- refresh all project skills tracked by skills-lock.json"
            echo "- update committed skill content and lockfile hashes"
            echo
            echo "Generated by the daily project skill updater."
          } > "$body"

          number="$(
            gh pr list \
              --head "$branch" \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"
          if [[ -n "$number" ]]; then
            gh pr edit "$number" \
              --title "chore: update project skills" \
              --body-file "$body"
          else
            gh pr create \
              --base main \
              --head "$branch" \
              --title "chore: update project skills" \
              --body-file "$body"
          fi
